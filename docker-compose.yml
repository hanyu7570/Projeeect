services:
  db:
    image: mariadb:11-jammy
    restart: unless-stopped
    env_file: ./backend/web/.env
    environment:
      MARIADB_DATABASE:      ${DB_NAME}
      MARIADB_USER:          ${DB_USER}
      MARIADB_PASSWORD:      ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 5

  web:
    build:
      context: ./backend/web
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: ./backend/web/.env
    volumes:
      - ./backend/web:/app
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${APP_ENV:-dev}
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src      # only mounted in dev, ignored in prod
    ports:
      - "80:80"                      # prod (Nginx)
      - "5173:5173"                  # dev (Vite HMR)
    environment:
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      - web

volumes:
  mariadb_data:
